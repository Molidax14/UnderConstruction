# VirtualHost para Under Construction - puerto 5175
# SPA: fallback a index.html para rutas de React Router
# API: proxy /api a Spring Boot en 127.0.0.1:3099 (no exponer 3099 en internet)
<VirtualHost *:5175>
    ServerName localhost
    DocumentRoot /var/www/underconstruction

    ProxyPass /api http://127.0.0.1:3099/api
    ProxyPassReverse /api http://127.0.0.1:3099/api

    <Directory /var/www/underconstruction>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        # Fallback para React Router (SPA)
        FallbackResource /index.html
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/underconstruction-error.log
    CustomLog ${APACHE_LOG_DIR}/underconstruction-access.log combined
</VirtualHost>
